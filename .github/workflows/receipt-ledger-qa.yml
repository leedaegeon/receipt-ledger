name: receipt-ledger-qa

on:
  workflow_dispatch:
    inputs:
      regressionThresholdSec:
        description: 'Benchmark regression threshold in seconds (delta vs previous run)'
        required: false
        default: '0.2'
      failOnRegression:
        description: 'Fail benchmark job when regression exceeds threshold (true/false)'
        required: false
        default: 'true'
      maxAllowedFailures:
        description: 'Allowed failed cases in qa_smoke before job failure'
        required: false
        default: '0'
  push:
    paths:
      - 'projects/receipt-ledger/parser/**'
      - 'projects/receipt-ledger/data/sample_tossbank.csv'
      - 'projects/receipt-ledger/LOCAL_RUN_GUIDE.md'
  pull_request:
    paths:
      - 'projects/receipt-ledger/parser/**'
      - 'projects/receipt-ledger/data/sample_tossbank.csv'
      - 'projects/receipt-ledger/LOCAL_RUN_GUIDE.md'

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [benchmark, exceptions]
    defaults:
      run:
        working-directory: projects/receipt-ledger/parser
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pdf parser dependency
        run: npm ci

      - name: Run QA smoke (${{ matrix.suite }})
        env:
          MAX_FAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.maxAllowedFailures || '0' }}
        run: python qa_smoke.py --suite ${{ matrix.suite }} --max-failures "$MAX_FAIL" --report-json ../data/qa_smoke_report.json

      - name: Build QA smoke summary markdown
        if: always()
        run: python qa_smoke_summary.py

      - name: Append benchmark history row
        if: always() && matrix.suite == 'benchmark'
        run: python benchmark_history.py

      - name: Build benchmark summary markdown
        if: always() && matrix.suite == 'benchmark'
        env:
          REG_THRESHOLD: ${{ github.event_name == 'workflow_dispatch' && inputs.regressionThresholdSec || '0.2' }}
          FAIL_ON_REG: ${{ github.event_name == 'workflow_dispatch' && inputs.failOnRegression || 'true' }}
        run: |
          if [ "$FAIL_ON_REG" = "true" ]; then
            python benchmark_summary.py --regression-threshold-sec "$REG_THRESHOLD" --fail-on-regression
          else
            python benchmark_summary.py --regression-threshold-sec "$REG_THRESHOLD"
          fi

      - name: Build integrated QA summary markdown
        if: always() && matrix.suite == 'benchmark'
        run: python qa_report_merge.py

      - name: Append QA smoke summary to job summary
        if: always()
        run: cat ../data/qa_smoke_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Append benchmark summary to job summary
        if: always() && matrix.suite == 'benchmark'
        run: cat ../data/benchmark_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Build policy brief markdown
        if: always() && matrix.suite == 'benchmark'
        run: python qa_policy_brief.py

      - name: Append policy brief to job summary (top)
        if: always() && matrix.suite == 'benchmark'
        run: cat ../data/qa_policy_brief.md >> $GITHUB_STEP_SUMMARY

      - name: Warn if HIGH action items have TBD owner/due
        if: always() && matrix.suite == 'benchmark'
        run: |
          python - <<'PY' > /tmp/high_action_warn.md
          import json
          from pathlib import Path
          p = Path('../data/qa_action_items.json')
          if not p.exists():
              raise SystemExit(0)
          d = json.loads(p.read_text(encoding='utf-8'))
          warn = [x for x in d.get('items', []) if x.get('priority') == 'HIGH' and (x.get('owner') == 'TBD' or x.get('due') == 'TBD')]
          if warn:
              print('## ⚠️ HIGH Action Items need owner/due')
              for w in warn:
                  print(f"- {w.get('task')} (owner={w.get('owner')}, due={w.get('due')})")
          PY
          cat /tmp/high_action_warn.md >> $GITHUB_STEP_SUMMARY

      - name: Append integrated summary to job summary
        if: always() && matrix.suite == 'benchmark'
        run: cat ../data/qa_integrated_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Upload benchmark artifacts
        if: always() && matrix.suite == 'benchmark'
        uses: actions/upload-artifact@v4
        with:
          name: receipt-ledger-benchmark
          path: |
            projects/receipt-ledger/data/benchmark_pipeline_result.json
            projects/receipt-ledger/data/benchmark_summary.md
            projects/receipt-ledger/data/qa_integrated_summary.md
            projects/receipt-ledger/data/qa_policy_brief.md
            projects/receipt-ledger/data/qa_action_items.json

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: receipt-ledger-smoke-${{ matrix.suite }}
          path: |
            projects/receipt-ledger/data/qa_smoke_report.json
            projects/receipt-ledger/data/qa_smoke_summary.md
