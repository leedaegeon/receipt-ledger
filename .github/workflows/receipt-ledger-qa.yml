name: receipt-ledger-qa

on:
  workflow_dispatch:
    inputs:
      regressionThresholdSec:
        description: 'Benchmark regression threshold in seconds (delta vs previous run)'
        required: false
        default: '0.2'
      failOnRegression:
        description: 'Fail benchmark job when regression exceeds threshold (true/false)'
        required: false
        default: 'true'
      maxAllowedFailures:
        description: 'Allowed failed cases in qa_smoke before job failure'
        required: false
        default: '0'
      failOnUnassignedHigh:
        description: 'Fail when HIGH action items have owner/due as TBD (true/false)'
        required: false
        default: 'false'
      smokeEscalateThreshold:
        description: 'Recurrence count to escalate smoke action item priority to HIGH'
        required: false
        default: '3'
  push:
    paths:
      - 'projects/receipt-ledger/parser/**'
      - 'projects/receipt-ledger/data/sample_tossbank.csv'
      - 'projects/receipt-ledger/LOCAL_RUN_GUIDE.md'
  pull_request:
    paths:
      - 'projects/receipt-ledger/parser/**'
      - 'projects/receipt-ledger/data/sample_tossbank.csv'
      - 'projects/receipt-ledger/LOCAL_RUN_GUIDE.md'

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [benchmark, exceptions]
    defaults:
      run:
        working-directory: projects/receipt-ledger/parser
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pdf parser dependency
        run: npm ci

      - name: Run QA smoke (${{ matrix.suite }})
        env:
          MAX_FAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.maxAllowedFailures || '0' }}
          SMOKE_ESCALATE_THRESHOLD: ${{ github.event_name == 'workflow_dispatch' && inputs.smokeEscalateThreshold || '3' }}
        run: python qa_smoke.py --suite ${{ matrix.suite }} --max-failures "$MAX_FAIL" --smoke-escalate-threshold "$SMOKE_ESCALATE_THRESHOLD" --report-json ../data/qa_smoke_report.json

      - name: Build QA smoke summary markdown
        if: always()
        run: python qa_smoke_summary.py

      - name: Append benchmark history row
        if: always() && matrix.suite == 'benchmark'
        run: python benchmark_history.py

      - name: Build benchmark summary markdown
        if: always() && matrix.suite == 'benchmark'
        env:
          REG_THRESHOLD: ${{ github.event_name == 'workflow_dispatch' && inputs.regressionThresholdSec || '0.2' }}
          FAIL_ON_REG: ${{ github.event_name == 'workflow_dispatch' && inputs.failOnRegression || 'true' }}
        run: |
          if [ "$FAIL_ON_REG" = "true" ]; then
            python benchmark_summary.py --regression-threshold-sec "$REG_THRESHOLD" --fail-on-regression
          else
            python benchmark_summary.py --regression-threshold-sec "$REG_THRESHOLD"
          fi

      - name: Build integrated QA summary markdown
        if: always() && matrix.suite == 'benchmark'
        run: python qa_report_merge.py

      - name: Append QA smoke summary to job summary
        if: always()
        run: cat ../data/qa_smoke_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Append benchmark summary to job summary
        if: always() && matrix.suite == 'benchmark'
        run: cat ../data/benchmark_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Build policy brief markdown
        if: always() && matrix.suite == 'benchmark'
        env:
          SMOKE_ESCALATE_THRESHOLD: ${{ github.event_name == 'workflow_dispatch' && inputs.smokeEscalateThreshold || '3' }}
        run: python qa_policy_brief.py --smoke-escalate-threshold "$SMOKE_ESCALATE_THRESHOLD"

      - name: Append action-item history rows
        if: always() && matrix.suite == 'benchmark'
        run: python qa_action_history.py

      - name: Build action-item recurrence summary
        if: always() && matrix.suite == 'benchmark'
        run: python qa_action_recurrence.py

      - name: Build policy snapshot json
        if: always() && matrix.suite == 'benchmark'
        run: python qa_policy_snapshot.py

      - name: Append policy snapshot history rows
        if: always() && matrix.suite == 'benchmark'
        run: python qa_policy_snapshot_history.py

      - name: Build policy snapshot diff markdown
        if: always() && matrix.suite == 'benchmark'
        run: python qa_policy_snapshot_diff.py

      - name: Append policy brief to job summary (top)
        if: always() && matrix.suite == 'benchmark'
        run: cat ../data/qa_policy_brief.md >> $GITHUB_STEP_SUMMARY

      - name: Check HIGH action item ownership
        if: always() && matrix.suite == 'benchmark'
        env:
          FAIL_UNASSIGNED_HIGH: ${{ github.event_name == 'workflow_dispatch' && inputs.failOnUnassignedHigh || 'false' }}
        run: |
          if [ "$FAIL_UNASSIGNED_HIGH" = "true" ]; then
            python check_action_item_ownership.py --path ../data/qa_action_items.json --fail-on-unassigned-high | tee /tmp/high_action_warn.md
          else
            python check_action_item_ownership.py --path ../data/qa_action_items.json | tee /tmp/high_action_warn.md
          fi
          cat /tmp/high_action_warn.md >> $GITHUB_STEP_SUMMARY

      - name: Append integrated summary to job summary
        if: always() && matrix.suite == 'benchmark'
        run: cat ../data/qa_integrated_summary.md >> $GITHUB_STEP_SUMMARY

      - name: Append policy snapshot diff to job summary
        if: always() && matrix.suite == 'benchmark'
        run: cat ../data/qa_policy_snapshot_diff.md >> $GITHUB_STEP_SUMMARY

      - name: Warn on policy parameter changes
        if: always() && matrix.suite == 'benchmark'
        run: |
          CHANGED=$(grep -m1 "^- changed_count:" ../data/qa_policy_snapshot_diff.md | awk '{print $3}')
          if [ -n "$CHANGED" ] && [ "$CHANGED" != "0" ]; then
            echo "## ⚠️ Policy parameters changed (count=$CHANGED)" >> $GITHUB_STEP_SUMMARY
            grep '^- `' ../data/qa_policy_snapshot_diff.md >> $GITHUB_STEP_SUMMARY || true
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Append action-item recurrence to job summary
        if: always() && matrix.suite == 'benchmark'
        run: cat ../data/qa_action_recurrence.md >> $GITHUB_STEP_SUMMARY

      - name: Upload benchmark artifacts
        if: always() && matrix.suite == 'benchmark'
        uses: actions/upload-artifact@v4
        with:
          name: receipt-ledger-benchmark
          path: |
            projects/receipt-ledger/data/benchmark_pipeline_result.json
            projects/receipt-ledger/data/benchmark_summary.md
            projects/receipt-ledger/data/qa_integrated_summary.md
            projects/receipt-ledger/data/qa_policy_brief.md
            projects/receipt-ledger/data/qa_action_items.json
            projects/receipt-ledger/data/qa_action_history.jsonl
            projects/receipt-ledger/data/qa_action_recurrence.md
            projects/receipt-ledger/data/qa_policy_snapshot.json
            projects/receipt-ledger/data/qa_policy_snapshot_history.jsonl
            projects/receipt-ledger/data/qa_policy_snapshot_diff.md

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: receipt-ledger-smoke-${{ matrix.suite }}
          path: |
            projects/receipt-ledger/data/qa_smoke_report.json
            projects/receipt-ledger/data/qa_smoke_summary.md
